<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>geoENERGIE · Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#F2F7F6;color:#222;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px)}
.obox{background:#fff;border-radius:16px;padding:28px;max-width:540px;width:95%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.28)}
.btn{border:none;border-radius:8px;padding:9px 20px;font-weight:700;cursor:pointer;font-size:13px;transition:opacity .15s,background .15s;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.bt{background:#00857A;color:#fff}.bt:hover:not(:disabled){background:#1a5c58}
.bd{background:#1a5c58;color:#fff}.bd:hover:not(:disabled){background:#0f3835}
.br{background:#EF5350;color:#fff}
.bg2{background:#777;color:#fff}
.inp{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;transition:border .2s}
.inp:focus{border-color:#00857A}
.hint{background:#E0F2F1;border-left:3px solid #00857A;border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:#1a5c58;margin-bottom:10px;line-height:1.55}
.sinfo{display:flex;align-items:flex-start;gap:9px;background:#F2F7F6;border-radius:8px;padding:10px 12px;margin-bottom:7px;font-size:12px;color:#555;line-height:1.5}
.snum{background:#1a5c58;color:#fff;border-radius:50%;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.stepper{display:flex;align-items:center;margin-bottom:16px}
.sdot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.sline{flex:1;height:3px;margin:0 4px}
.wf-wrap{position:relative;border:2px solid #B2DFDB;border-radius:8px;background:#FAFFFE;overflow:hidden;touch-action:none}
.wf-node{position:absolute;border:1.5px solid #1a5c58;border-radius:3px;background:#fff;cursor:grab;user-select:none;touch-action:none;transition:box-shadow .1s}
.wf-node.sel{box-shadow:0 0 0 2.5px #00857A}
.wf-node.csrc{box-shadow:0 0 0 2.5px #FFB300}
.wf-node.chov{box-shadow:0 0 0 2.5px #43A047}
.wf-node:active{cursor:grabbing}
.wf-node .gl{font-weight:700;color:#00857A;margin-bottom:2px}
.wf-node .del-btn{position:absolute;top:-8px;right:-8px;background:#EF5350;color:#fff;border:none;border-radius:50%;cursor:pointer;display:none;line-height:1;text-align:center}
.wf-node:hover .del-btn,.wf-node.sel .del-btn{display:flex;align-items:center;justify-content:center}
.wf-node .port{position:absolute;background:#00857A;border-radius:50%;border:2px solid #fff;cursor:crosshair;opacity:0;transition:opacity .15s;z-index:5}
.wf-node:hover .port,.wf-node.sel .port{opacity:1}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.bar-fill span{color:#fff;font-size:10px;font-weight:700}
.gal-item{border:1.5px solid #ddd;border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;padding:8px}
.gal-item:hover,.gal-item.gsel{border-color:#00857A;border-width:2px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect,useMemo}=React;
const T='#00857A',D='#1a5c58',G='#43A047',R='#EF5350',OR='#FF7043';
const ADMIN_PIN='admin2026';
const SL=['','Unzureichend','Verbesserungsbedürftig','Befriedigend','Gut','Ausgezeichnet'];
const CW=1060,CH=500;

function parseCfg(){
  try{const p=new URLSearchParams(location.hash.slice(1)),r=p.get('cfg');if(!r)return null;const[k,m]=atob(r).split('|');return k&&m?{key:k,mid:m,isAdmin:p.get('admin')==='1'}:null;}catch{return null;}
}
function makeUrls(k,m){const b=location.href.split('#')[0],e=btoa(k+'|'+m);return{participant:b+'#cfg='+e,admin:b+'#cfg='+e+'&admin=1'};}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function apiCreate(key){
  const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'X-Master-Key':key,'Content-Type':'application/json','X-Bin-Name':'ge-master-v4'},body:JSON.stringify({ids:[]})});
  if(!r.ok)throw new Error('Bin fehlgeschlagen ('+r.status+')');return(await r.json()).metadata.id;
}
async function apiSubmit(key,mid,data){
  await sleep(Math.random()*4000);
  const cr=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'X-Master-Key':key,'Content-Type':'application/json','X-Bin-Name':'ge-r-'+Date.now()},body:JSON.stringify({...data,ts:new Date().toISOString()})});
  if(!cr.ok)throw new Error('Speichern fehlgeschlagen ('+cr.status+')');
  const rid=(await cr.json()).metadata.id;
  for(let i=0;i<10;i++){
    try{const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',{headers:{'X-Master-Key':key}});if(!mr.ok)throw 0;const ids=(await mr.json()).record.ids||[];if(ids.includes(rid))return;const mw=await fetch('https://api.jsonbin.io/v3/b/'+mid,{method:'PUT',headers:{'X-Master-Key':key,'Content-Type':'application/json'},body:JSON.stringify({ids:[...ids,rid]})});if(mw.ok)return;}catch{}
    await sleep(Math.pow(2,i)*250+Math.random()*500);
  }
}
async function apiLoad(key,mid){
  const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',{headers:{'X-Master-Key':key}});
  if(!mr.ok)throw new Error('Laden fehlgeschlagen ('+mr.status+')');
  const ids=(await mr.json()).record.ids||[];if(!ids.length)return[];
  const rs=await Promise.allSettled(ids.map(async id=>{const r=await fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',{headers:{'X-Master-Key':key}});return r.ok?(await r.json()).record:null;}));
  return rs.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
}
async function apiClear(key,mid){
  const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',{headers:{'X-Master-Key':key}});
  if(!mr.ok)throw new Error('Laden fehlgeschlagen');const ids=(await mr.json()).record.ids||[];
  await Promise.allSettled(ids.map(id=>fetch('https://api.jsonbin.io/v3/b/'+id,{method:'DELETE',headers:{'X-Master-Key':key}})));
  await fetch('https://api.jsonbin.io/v3/b/'+mid,{method:'PUT',headers:{'X-Master-Key':key,'Content-Type':'application/json'},body:JSON.stringify({ids:[]})});
}

function initNodes(){return[
  {id:'proj',  x:8,  y:132,w:188,h:118,bdr:true, gl:'Projekt',                 glU:false,text:'Projektinformationen\nProjektverzeichnis\nOGIS Projekt'},
  {id:'ra',    x:210,y:88, w:218,h:192,bdr:true, gl:'Räumliche Analyse',        glU:false,text:'Definition des Bauvorhabens\n↓\nFreiflächenanalyse\n↓\nBelegung der Sonden'},
  {id:'ewsp',  x:444,y:88, w:236,h:248,bdr:true, gl:'EWS Potenzial',            glU:false,text:'Sondenlayerauswahl\n↓\nSondenparameter\nUntergrund\nLastkurve\nWärmepumpe\nSimulationseinstellungen'},
  {id:'ewssz', x:696,y:112,w:186,h:112,bdr:true, gl:null,                       glU:false,text:'EWS Sizing\nTemperatursimulation\nPotenzialanalyse'},
  {id:'ewsw',  x:898,y:88, w:155,h:192,bdr:true, gl:'EWS Wirtschaftlichkeit',   glU:true, text:'Eingaben\nSzenarien\n↓\nErgebnisse'},
  {id:'pos',   x:210,y:368,w:218,h:122,bdr:true, gl:'Potenzial Offene Systeme', glU:true, text:'Hydrogeologie\nHydrochemie\nEnergie\nSimulationsparameter'},
  {id:'ba',    x:444,y:368,w:236,h:108,bdr:true, gl:null,                       glU:false,text:'Brunnenanlage Dimensionierung\nBrunnenanlage Simulation\nMaximal Potenzial'},
  {id:'bericht',x:696,y:342,w:186,h:150,bdr:true,gl:'Bericht',                 glU:false,text:'Bausteine\nText\nLinks\nDiagrammen\nKarten'},
  {id:'pdf',   x:898,y:386,w:105,h:68, bdr:true, gl:null,                       glU:false,text:'WORD\nPDF'},
];}
function initEdges(){return[
  {id:'e1', from:'proj',   to:'ra',      sty:'sd'},{id:'e2', from:'ra',    to:'ewsp',    sty:'sd'},
  {id:'e3', from:'ra',     to:'pos',     sty:'sg'},{id:'e4', from:'ewsp',  to:'ewssz',   sty:'bd'},
  {id:'e5', from:'ewssz',  to:'ewsw',    sty:'bd'},{id:'e6', from:'ewssz', to:'bericht', sty:'sd'},
  {id:'e7', from:'ewsw',   to:'bericht', sty:'sd'},{id:'e8', from:'pos',   to:'ba',      sty:'bg'},
  {id:'e9', from:'ba',     to:'bericht', sty:'bg'},{id:'e10',from:'bericht',to:'pdf',    sty:'bd'},
];}

function nc(n){return{cx:n.x+n.w/2,cy:n.y+n.h/2};}
function ePath(a,b){
  if(!a||!b)return null;
  const dx=b.cx-a.cx,dy=b.cy-a.cy;
  let x1,y1,x2,y2;
  if(Math.abs(dx)>=Math.abs(dy)){x1=dx>0?a.x+a.w:a.x;y1=a.cy;x2=dx>0?b.x:b.x+b.w;y2=b.cy;}
  else{x1=a.cx;y1=dy>0?a.y+a.h:a.y;x2=b.cx;y2=dy>0?b.y:b.y+b.h;}
  const mx=(x1+x2)/2;
  if(Math.abs(dx)>=Math.abs(dy))return`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  const my=(y1+y2)/2;return`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
}
function eStroke(sty){return sty==='sg'||sty==='bg'?G:D;}
function eWidth(sty){return 2;}
function eMkr(sty){
  if(sty==='bg')return'url(#abg)';if(sty==='bd')return'url(#abd)';
  if(sty==='sg')return'url(#ag)';return'url(#ad)';
}

function WFEditor({nodes,setNodes,edges,setEdges,readOnly=false}){
  const wRef=useRef(null);
  const [sel,setSel]=useState(null);
  const [editId,setEditId]=useState(null);
  const [connSrc,setConnSrc]=useState(null);
  const [hov,setHov]=useState(null);
  const [drag,setDrag]=useState(null);
  const [wire,setWire]=useState(null);
  const [scale,setScale]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [panStart,setPanStart]=useState(null);
  const nm=useMemo(()=>Object.fromEntries(nodes.map(n=>[n.id,n])),[nodes]);

  useEffect(()=>{
    const u=()=>{if(wRef.current)setScale(wRef.current.offsetWidth/CW);};
    u();window.addEventListener('resize',u);return()=>window.removeEventListener('resize',u);
  },[]);

  function toC(cx,cy){const r=wRef.current.getBoundingClientRect();return{x:(cx-r.left+pan.x)/scale,y:(cy-r.top+pan.y)/scale};}

  function startDrag(e,id){
    if(readOnly||editId)return;e.stopPropagation();
    const p=e.touches?e.touches[0]:e,{x,y}=toC(p.clientX,p.clientY),n=nm[id];
    setDrag({id,ox:x-n.x,oy:y-n.y});setSel(id);setConnSrc(null);
  }
  function startPort(e,fromId){
    if(readOnly)return;e.stopPropagation();e.preventDefault();
    const p=e.touches?e.touches[0]:e,{x,y}=toC(p.clientX,p.clientY);
    setWire({fromId,x,y});setConnSrc(null);
  }

  useEffect(()=>{
    function mm(e){
      const p=e.touches?e.touches[0]:e,{x,y}=toC(p.clientX,p.clientY);
      if(drag)setNodes(ns=>ns.map(n=>n.id===drag.id?{...n,x:Math.max(0,Math.min(CW*2-n.w,x-drag.ox)),y:Math.max(0,Math.min(CH*2-n.h,y-drag.oy))}:n));
      if(wire){setWire(w=>({...w,x,y}));const h=nodes.find(n=>n.id!==wire.fromId&&x>=n.x&&x<=n.x+n.w&&y>=n.y&&y<=n.y+n.h);setHov(h?h.id:null);}
      if(panStart&&!drag&&!wire){
        const raw={x:p.clientX,y:p.clientY};
        setPan({x:panStart.px-(raw.x-panStart.mx),y:panStart.py-(raw.y-panStart.my)});
      }
    }
    function mu(){
      if(wire&&hov&&!edges.some(e=>e.from===wire.fromId&&e.to===hov))
        setEdges(es=>[...es,{id:'ec'+Date.now(),from:wire.fromId,to:hov,sty:'sd'}]);
      setDrag(null);setWire(null);setHov(null);setPanStart(null);
    }
    window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    window.addEventListener('touchmove',mm,{passive:false});window.addEventListener('touchend',mu);
    return()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);window.removeEventListener('touchmove',mm);window.removeEventListener('touchend',mu);};
  },[drag,wire,hov,nodes,edges,pan,panStart]);

  function clickNode(e,id){
    if(readOnly)return;e.stopPropagation();
    if(connSrc){
      if(connSrc!==id&&!edges.some(e=>e.from===connSrc&&e.to===id))
        setEdges(es=>[...es,{id:'ec'+Date.now(),from:connSrc,to:id,sty:'sd'}]);
      setConnSrc(null);
    }else setSel(id);
  }
  function dblNode(e,id){if(readOnly)return;e.stopPropagation();setEditId(id);setSel(id);}
  function finishEdit(id,v){setNodes(ns=>ns.map(n=>n.id===id?{...n,text:v}:n));setEditId(null);}
  function delNode(id){setNodes(ns=>ns.filter(n=>n.id!==id));setEdges(es=>es.filter(e=>e.from!==id&&e.to!==id));if(sel===id)setSel(null);}
  function addNode(){
    const id='n'+Date.now();
    setNodes(ns=>[...ns,{id,x:80+Math.random()*300,y:80+Math.random()*200,w:160,h:80,bdr:true,gl:null,glU:false,text:'Neuer Schritt'}]);
    setSel(id);setTimeout(()=>setEditId(id),60);
  }
  function editGL(id){const n=nm[id];const nl=prompt('Gruppen-Label (leer = entfernen):',n.gl||'');if(nl!==null)setNodes(ns=>ns.map(nd=>nd.id===id?{...nd,gl:nl||null}:nd));}

  const marks=(
    <defs>
      <marker id="ad"  markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0,0 9,3 0,6" fill={D}/></marker>
      <marker id="ag"  markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0,0 9,3 0,6" fill={G}/></marker>
      <marker id="abd" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0,0 9,3 0,6" fill={D}/></marker>
      <marker id="abg" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0,0 9,3 0,6" fill={G}/></marker>
      <marker id="anew" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0,0 9,3 0,6" fill="#9C27B0"/></marker>
    </defs>
  );

  const CH2=CH*scale;
  return(
    <div>
      {!readOnly&&(
        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
          <button className="btn bt" onClick={addNode} style={{fontSize:12,padding:'7px 14px'}}>＋ Block</button>
          <button className="btn" style={{background:connSrc?'#FFB300':D,color:'#fff',fontSize:12,padding:'7px 14px'}}
            onClick={()=>sel?setConnSrc(sel):null} disabled={!sel&&!connSrc}>
            {connSrc?'🔗 Ziel anklicken':'→ Verbinden'}
          </button>
          {connSrc&&<button className="btn bg2" style={{fontSize:12,padding:'7px 14px'}} onClick={()=>setConnSrc(null)}>✕</button>}
          <span style={{fontSize:11,color:'#aaa',fontStyle:'italic',flex:1,minWidth:0}}>
            {connSrc?'Klicke auf Ziel-Block…':sel?`"${(nm[sel]?.text||'').split('\n')[0]}" — Ziehen, Doppelklick zum Bearbeiten`:'Klick = auswählen · Ziehen = verschieben · Doppelklick = Text bearbeiten'}
          </span>
        </div>
      )}
      <div style={{border:'2px solid #B2DFDB',borderRadius:8,background:'#FAFFFE',overflow:'hidden',position:'relative',cursor:connSrc?'crosshair':panStart?'grabbing':'grab'}}
        ref={wRef}
        style2={{height:340}}
        onMouseDown={e=>{if(e.target===wRef.current||e.target.tagName==='svg'){const p=e.touches?e.touches[0]:e;setPanStart({mx:p.clientX,my:p.clientY,px:pan.x,py:pan.y});}}}
        onTouchStart={e=>{if(e.target===wRef.current||e.target.tagName==='svg'){const p=e.touches[0];setPanStart({mx:p.clientX,my:p.clientY,px:pan.x,py:pan.y});}}}
        onClick={()=>{if(connSrc)setConnSrc(null);else setSel(null);}}>
        <div style={{width:'100%',height:340,overflow:'hidden',position:'relative',
          cursor:connSrc?'crosshair':panStart?'grabbing':'default'}}>
        <svg style={{position:'absolute',top:0,left:0,pointerEvents:'none',
          transform:`translate(${-pan.x}px,${-pan.y}px) scale(${scale})`,
          transformOrigin:'top left',overflow:'visible',width:CW*2,height:CH*2}}
          width={CW*2} height={CH*2}>
          {marks}
          {edges.map(e=>{
            const fn=nm[e.from]?{...nm[e.from],...nc(nm[e.from])}:null;
            const tn=nm[e.to]?{...nm[e.to],...nc(nm[e.to])}:null;
            const d=ePath(fn,tn);if(!d)return null;
            return(
              <g key={e.id}>
                <path d={d} fill="none" stroke={eStroke(e.sty)} strokeWidth={eWidth(e.sty)} markerEnd={eMkr(e.sty)}/>
                {!readOnly&&<path d={d} fill="none" stroke="transparent" strokeWidth={18}
                  style={{cursor:'pointer',pointerEvents:'stroke'}}
                  onClick={ev=>{ev.stopPropagation();if(window.confirm('Verbindung löschen?'))setEdges(es=>es.filter(x=>x.id!==e.id));}}/>}
              </g>
            );
          })}
          {wire&&(()=>{const fn=nm[wire.fromId];if(!fn)return null;const c=nc(fn);return<line x1={c.cx} y1={c.cy} x2={wire.x} y2={wire.y} stroke="#9C27B0" strokeWidth={2} strokeDasharray="5,3" markerEnd="url(#anew)"/>;})()}
        </svg>

        {nodes.map(node=>{
          const isSel=sel===node.id,isCS=connSrc===node.id,isHov=hov===node.id,isEd=editId===node.id;
          const fs=10*scale,glFs=9*scale,pad=`${6*scale}px ${8*scale}px`,dbs=18*scale;
          return(
            <div key={node.id}
              className={'wf-node'+(isSel?' sel':'')+(isCS?' csrc':'')+(isHov?' chov':'')}
              style={{left:node.x*scale-pan.x,top:node.y*scale-pan.y,width:node.w*scale,minHeight:node.h*scale,
                fontSize:fs,padding:pad,border:node.bdr?`1.5px solid ${D}`:'none',background:node.bdr?'#fff':'transparent'}}
              onMouseDown={e=>startDrag(e,node.id)}
              onTouchStart={e=>startDrag(e,node.id)}
              onClick={e=>clickNode(e,node.id)}
              onDoubleClick={e=>dblNode(e,node.id)}>
              {node.gl&&!isEd&&(
                <div className="gl" style={{fontSize:glFs,textDecoration:node.glU?'underline':'none',cursor:readOnly?'default':'text',marginBottom:2*scale}}
                  onDoubleClick={e=>{e.stopPropagation();if(!readOnly)editGL(node.id);}}>
                  {node.gl}
                </div>
              )}
              {isEd?(
                <textarea autoFocus defaultValue={node.text}
                  style={{width:'100%',border:'none',outline:'none',resize:'none',fontSize:fs,lineHeight:1.35,background:'transparent',fontFamily:'inherit',minHeight:40*scale}}
                  rows={Math.max(3,(node.text||'').split('\n').length+1)}
                  onBlur={e=>finishEdit(node.id,e.target.value)}
                  onKeyDown={e=>e.key==='Escape'&&finishEdit(node.id,e.target.value)}
                  onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}/>
              ):(
                <div style={{pointerEvents:'none',lineHeight:1.35}}>
                  {(node.text||'').split('\n').map((ln,i)=>(
                    <div key={i} style={{fontWeight:ln==='↓'||i===0?700:400,textAlign:ln==='↓'?'center':'left',fontSize:ln==='↓'?12*scale:fs}}>{ln}</div>
                  ))}
                </div>
              )}
              {!readOnly&&!isEd&&(
                <button className="del-btn"
                  style={{width:dbs,height:dbs,fontSize:11*scale,top:-7*scale,right:-7*scale}}
                  onClick={e=>{e.stopPropagation();delNode(node.id);}}>×</button>
              )}
              {!readOnly&&['t','r','b','l'].map(s=>{
                const ps={position:'absolute',width:11*scale,height:11*scale};
                if(s==='t'){ps.top=-5*scale;ps.left='50%';ps.transform='translateX(-50%)';}

        <div className="card">
          {step===1&&(<>
            <h2 style={{margin:'0 0 4px',color:D,fontSize:18}}>1. Gesamtbewertung</h2>
            <p style={{color:'#888',marginBottom:16,fontSize:13}}>Wie bewerten Sie den geoENERGIE Tool insgesamt?</p>
            <Stars val={rating} set={setRating}/>
            <div style={{marginTop:16}}><label style={{display:'block',marginBottom:5,fontWeight:700,fontSize:12,color:D}}>Kommentar <span style={{color:'#bbb',fontWeight:400}}>(optional)</span></label><textarea value={comment} onChange={e=>setCmt(e.target.value)} placeholder="Was hat besonders gut gefallen? Was weniger?" style={{...inp,height:80,resize:'vertical'}}/></div>
            <div style={{textAlign:'right',marginTop:16}}><button className="btn bt" onClick={()=>setStep(2)} disabled={!rating}>Weiter →</button></div>
          </>)}
          {step===2&&(<>
            <h2 style={{margin:'0 0 4px',color:D,fontSize:18}}>2. Workflow gestalten</h2>
            <div className="hint" style={{marginBottom:12}}>Gestalten Sie den Workflow so, wie er <strong>für Sie ideal wäre</strong>. <strong>Doppelklick</strong> = Text bearbeiten · <strong>Ziehen</strong> = verschieben · <strong>Punkt</strong> am Rand ziehen = neue Verbindung · <strong>×</strong> = löschen · Verbindung anklicken = löschen</div>
            <WFEditor nodes={nodes} setNodes={setNodes} edges={edges} setEdges={setEdges}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:16}}>
              <button className="btn bg2" onClick={()=>setStep(1)}>← Zurück</button>
              <div style={{display:'flex',gap:8}}>
                <button className="btn" style={{background:'#eee',color:'#555'}} onClick={()=>{if(window.confirm('Workflow zurücksetzen?')){setNodes(initNodes());setEdges(initEdges());}}}>↺ Reset</button>
                <button className="btn bt" onClick={()=>setStep(3)}>Weiter →</button>
              </div>
            </div>
          </>)}
          {step===3&&(<>
            <h2 style={{margin:'0 0 4px',color:D,fontSize:18}}>3. Empfehlungen</h2>
            <p style={{color:'#888',marginBottom:14,fontSize:13}}>Welche Features oder Verbesserungen würden Sie sich wünschen?</p>
            <textarea value={recs} onChange={e=>setRecs(e.target.value)} placeholder="z.B. FEFLOW-Integration, mobiler Zugriff, automatischer Bericht…" style={{...inp,height:100,resize:'vertical'}}/>
            <div style={{marginTop:12}}><label style={{display:'block',fontWeight:700,fontSize:12,color:D,marginBottom:5}}>Name / Firma <span style={{color:'#bbb',fontWeight:400}}>(optional)</span></label><input className="inp" value={uname} onChange={e=>setUname(e.target.value)} placeholder="Ihr Name oder Organisation"/></div>
            {saveErr&&<div style={{color:R,fontSize:12,marginTop:10,background:'#FFEBEE',padding:'8px 12px',borderRadius:6}}>⚠️ {saveErr}</div>}
            {saving&&<div style={{fontSize:11,color:'#aaa',marginTop:8,textAlign:'center'}}>⏳ Wird übertragen — bitte Seite nicht schließen…</div>}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:16}}>
              <button className="btn bg2" onClick={()=>setStep(2)}>← Zurück</button>
              <button className="btn bt" onClick={submit} disabled={saving}>{saving?'⏳ Speichert…':'✓ Absenden'}</button>
            </div>
          </>)}
          {step==='done'&&(<div style={{textAlign:'center',padding:'36px 16px'}}><div style={{fontSize:58}}>🌍</div><h2 style={{color:T,marginTop:12,fontSize:21}}>Vielen Dank!</h2><p style={{color:'#888',fontSize:14,marginTop:8}}>Ihr Feedback wurde erfolgreich gespeichert.</p><div style={{marginTop:24,color:D,fontWeight:700,fontSize:13}}>Erdwärme. Aus einer Hand.</div></div>)}
        </div>
      </>)}
      {mode==='results'&&adminOk&&<Results data={data} onClear={clearAll} onReload={loadR}/>}
      {mode==='results'&&!isAdmin&&<div className="card" style={{textAlign:'center',padding:50}}><div style={{fontSize:48}}>🔒</div><p style={{marginTop:12,color:'#888'}}>Ergebnisse sind nur für Administratoren.</p></div>}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
