<script type="text/babel">
const {useState,useRef,useCallback,useMemo,useEffect}=React;

// ─── URL config ────────────────────────────────────────────────────────────
function parseCfg(){
  try{
    const p=new URLSearchParams(location.hash.slice(1));
    const r=p.get('cfg'); if(!r) return null;
    const [key,mid]=atob(r).split('|');
    return key&&mid?{key,mid,isAdmin:p.get('admin')==='1'}:null;
  }catch{return null;}
}
function makeUrls(key,mid){
  const b=location.href.split('#')[0];
  const e=btoa(key+'|'+mid);
  return{participant:b+'#cfg='+e, admin:b+'#cfg='+e+'&admin=1'};
}

// ─── JSONBin API — concurrent-safe ────────────────────────────────────────
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function apiCreate(key){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'X-Master-Key':key,'Content-Type':'application/json','X-Bin-Name':'ge-master-idx'},
    body:JSON.stringify({ids:[]})
  });
  if(!r.ok) throw new Error('Bin-Erstellung fehlgeschlagen ('+r.status+') — API Key prüfen');
  return (await r.json()).metadata.id;
}

async function apiSubmit(key,mid,data){
  // Random delay 0-4s spreads 30 simultaneous submits
  await sleep(Math.random()*4000);
  // Each response = own bin → no write conflict at all
  const cr=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'X-Master-Key':key,'Content-Type':'application/json',
      'X-Bin-Name':'ge-r-'+Date.now()},
    body:JSON.stringify({...data,ts:new Date().toISOString()})
  });
  if(!cr.ok) throw new Error('Speichern fehlgeschlagen ('+cr.status+')');
  const rid=(await cr.json()).metadata.id;
  // Register in index with retry+backoff
  for(let i=0;i<10;i++){
    try{
      const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',
        {headers:{'X-Master-Key':key}});
      if(!mr.ok) throw 0;
      const ids=(await mr.json()).record.ids||[];
      if(ids.includes(rid)) return; // already registered
      const mw=await fetch('https://api.jsonbin.io/v3/b/'+mid,{
        method:'PUT',
        headers:{'X-Master-Key':key,'Content-Type':'application/json'},
        body:JSON.stringify({ids:[...ids,rid]})
      });
      if(mw.ok) return;
    }catch{}
    await sleep(Math.pow(2,i)*250+Math.random()*500);
  }
  // Response saved in rid — only index update failed. Acceptable.
}

async function apiLoad(key,mid){
  const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',
    {headers:{'X-Master-Key':key}});
  if(!mr.ok) throw new Error('Laden fehlgeschlagen ('+mr.status+')');
  const ids=(await mr.json()).record.ids||[];
  if(!ids.length) return [];
  const rs=await Promise.allSettled(ids.map(async id=>{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',
      {headers:{'X-Master-Key':key}});
    return r.ok?(await r.json()).record:null;
  }));
  return rs.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
}

async function apiClear(key,mid){
  const mr=await fetch('https://api.jsonbin.io/v3/b/'+mid+'/latest',
    {headers:{'X-Master-Key':key}});
  if(!mr.ok) throw new Error('Laden fehlgeschlagen');
  const ids=(await mr.json()).record.ids||[];
  await Promise.allSettled(ids.map(id=>
    fetch('https://api.jsonbin.io/v3/b/'+id,{method:'DELETE',
      headers:{'X-Master-Key':key}})
  ));
  await fetch('https://api.jsonbin.io/v3/b/'+mid,{
    method:'PUT',
    headers:{'X-Master-Key':key,'Content-Type':'application/json'},
    body:JSON.stringify({ids:[]})
  });
}

const EDGES=[
  // proj → ra

  // ra inner → ewsp (dark diagonal)

function nodeCenter(n){return{x:n.x+n.w/2,y:n.y+n.h/2};}

function lnY(node,i){
  const base=node.y+(node.bdr?14:12);
  let y=base;
  for(let j=0;j<i;j++) y+=node.lns[j]==='↓'?16:13;
  return y;
}

// ─── SVG Workflow renderer ─────────────────────────────────────────────────
function WorkflowSVG({mode,delN,delE,onTN,onTE,nStats,eStats,addedItems,total}){
  delN=delN||new Set(); delE=delE||new Set();
  nStats=nStats||{}; eStats=eStats||{};
  addedItems=addedItems||[];

  function heatCol(retained){
    if(retained===undefined||retained===null) return null;
    if(retained<0.35) return{fill:'rgba(239,83,80,.25)',stroke:R};
    if(retained<0.65) return{fill:'rgba(255,112,67,.2)',stroke:OR};
    return null;
  }

  const pts2s=pts=>pts.map(p=>p.x+','+p.y).join(' ');

  return(
    <div className="wfc">
      <svg viewBox="0 0 1082 505" style={{display:'block',minWidth:680,width:'100%'}}>
        <defs>
          <marker id="ad" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0,0 10,3.5 0,7" fill={D}/>
          </marker>
          <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0,0 10,3.5 0,7" fill={G}/>
          </marker>
          <marker id="bd" markerWidth="18" markerHeight="12" refX="17" refY="6" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,2 L11,2 L11,0 L18,6 L11,12 L11,10 L0,10 Z" fill={D}/>
          </marker>
          <marker id="bg" markerWidth="18" markerHeight="12" refX="17" refY="6" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,2 L11,2 L11,0 L18,6 L11,12 L11,10 L0,10 Z" fill={G}/>
          </marker>
          <marker id="bdlg" markerWidth="22" markerHeight="15" refX="21" refY="7.5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,2.5 L14,2.5 L14,0 L22,7.5 L14,15 L14,12.5 L0,12.5 Z" fill={D}/>
          </marker>
          <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0,0 10,3.5 0,7" fill={R}/>
          </marker>
        </defs>

        {/* Edges */}
        {EDGES.map(edge=>{
          const isDel=mode==='edit'&&delE.has(edge.id);
          const st=eStats[edge.id];
          const ht=mode==='diff'&&st?heatCol(st.ret):null;
          const stroke=isDel?R:(ht?ht.stroke:edge.col);
          const dash=isDel?'7,4':ht?'5,3':'none';
          const mkr=isDel?'ar':edge.mkr;
          const op=isDel?0.35:ht?0.7:1;
          const ps=pts2s(edge.pts);
          const mi=Math.floor(edge.pts.length/2);
          const mx=(edge.pts[mi].x+(edge.pts[Math.max(0,mi-1)].x))/2;
          const my=(edge.pts[mi].y+(edge.pts[Math.max(0,mi-1)].y))/2;
          return(
            <g key={edge.id} opacity={op}>
              <polyline points={ps} fill="none" stroke={stroke}
                strokeWidth={edge.w} strokeDasharray={dash}
                markerEnd={'url(#'+mkr+')'}/>
              <polyline points={ps} fill="none" stroke="transparent" strokeWidth={18}
                style={{cursor:mode==='edit'?'pointer':'default'}}
                onClick={()=>mode==='edit'&&onTE&&onTE(edge.id)}/>
              {mode==='diff'&&st&&st.del>0&&(
                <g transform={'translate('+mx+','+my+')'}>
                  <rect x={-18} y={-9} width={36} height={17} rx={8}
                    fill={ht?ht.stroke:OR} opacity={.9}/>
                  <text textAnchor="middle" y={4} fontSize={9} fill="#fff" fontWeight={700}>
                    -{Math.round(st.del/total*100)}%
                  </text>
                </g>
              )}
            </g>
          );
        })}

        {/* Nodes */}
        {NODES.map(node=>{
          const isDel=mode==='edit'&&delN.has(node.id);
          const st=nStats[node.id];
          const ht=mode==='diff'&&st?heatCol(st.ret):null;
          return(
            <g key={node.id}
              onClick={()=>mode==='edit'&&onTN&&onTN(node.id)}
              style={{cursor:mode==='edit'?'pointer':'default'}}>

              {node.gl&&(
                <text x={node.x+node.w/2} y={node.y-5}
                  textAnchor="middle" fontSize={10.5} fontWeight={700} fill={T}
                  textDecoration={node.glU?'underline':'none'}>
                  {node.gl}
                </text>
              )}

              {node.bdr&&(
                <rect x={node.x} y={node.y} width={node.w} height={node.h}
                  fill="#fff" stroke={isDel?R:D} strokeWidth={isDel?2.5:1.5} rx={2}
                  opacity={isDel?0.25:1}/>
              )}

              {mode==='edit'&&(
                <rect x={node.x} y={node.y} width={node.w} height={node.h} rx={2}
                  fill={isDel?'rgba(239,83,80,.18)':'rgba(0,133,122,.05)'}
                  stroke={isDel?R:'transparent'} strokeWidth={2}/>
              )}

              {ht&&(
                <rect x={node.x} y={node.y} width={node.w} height={node.h} rx={2}
                  fill={ht.fill} stroke={ht.stroke} strokeWidth={2}/>
              )}

              {node.lns.map((ln,i)=>(
                <text key={i}
                  x={node.x+(ln==='↓'?node.w/2:9)}
                  y={lnY(node,i)}
                  textAnchor={ln==='↓'?'middle':'start'}
                  fontSize={ln==='↓'?14:10}
                  fontWeight={ln==='↓'||i===0?700:400}
                  fill={isDel?'#bbb':'#222'}
                  textDecoration={node.ul.includes(i)?'underline':'none'}>
                  {ln}
                </text>
              ))}

              {isDel&&(
                <>
                  <line x1={node.x+8} y1={node.y+8}
                    x2={node.x+node.w-8} y2={node.y+node.h-8}
                    stroke={R} strokeWidth={2.5} opacity={.65}/>
                  <line x1={node.x+node.w-8} y1={node.y+8}
                    x2={node.x+8} y2={node.y+node.h-8}
                    stroke={R} strokeWidth={2.5} opacity={.65}/>
                </>
              )}

              {mode==='diff'&&st&&st.del>0&&(
                <g>
                  <rect x={node.x+node.w-40} y={node.y+5} width={36} height={17} rx={8}
                    fill={ht?ht.stroke:OR} opacity={.92}/>
                  <text x={node.x+node.w-22} y={node.y+16}
                    textAnchor="middle" fontSize={9} fill="#fff" fontWeight={700}>
                    -{Math.round(st.del/total*100)}%
                  </text>
                </g>
              )}
            </g>
          );
        })}

        {/* Added nodes — shown below in diff mode */}
        {mode==='diff'&&addedItems.length>0&&addedItems.slice(0,9).map((it,i)=>(
          <g key={i} transform={'translate('+(8+i*130)+',488)'}>
            <rect width={125} height={16} rx={8} fill="#E8F5E9" stroke={G} strokeWidth={1}/>
            <text x={62} y={11.5} textAnchor="middle" fontSize={8.5}
              fill="#2E7D32" fontWeight={700}>
              + {it.label.length>16?it.label.slice(0,15)+'…':it.label} ({it.count}×)
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// ─── Setup (organiser only) ────────────────────────────────────────────────
function SetupScreen({onDone}){
  const [apiKey,setApiKey]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [urls,setUrls]=useState(null);
  const [copied,setCopied]=useState('');

  const create=async()=>{
    if(!apiKey.trim()){setErr('API Key eingeben.');return;}
    setBusy(true);setErr('');
    try{const mid=await apiCreate(apiKey.trim());setUrls(makeUrls(apiKey.trim(),mid));}
    catch(e){setErr(e.message);}
    finally{setBusy(false);}
  };

  const copy=(k,v)=>{
    navigator.clipboard.writeText(v);
    setCopied(k);setTimeout(()=>setCopied(''),2500);
  };

  return(
    <div className="overlay">
      <div className="obox">
        <h2 style={{color:D,marginBottom:6,fontSize:20}}>⚙️ Einmalige Einrichtung</h2>
        <p style={{color:'#888',fontSize:13,lineHeight:1.65,marginBottom:18}}>
          Diese Seite sehen <strong>nur Sie</strong>. Teilnehmer erhalten eine direkte URL ohne Setup.
        </p>

        <div className="step-info"><div className="step-num">1</div>
          <div>Kostenlosen Account auf <a href="https://jsonbin.io" target="_blank" style={{color:T,fontWeight:700}}>jsonbin.io</a> erstellen → <strong>API Keys</strong> → <strong>+ CREATE KEY</strong></div>
        </div>
        <div className="step-info"><div className="step-num">2</div>
          <div>Master Key unten eingeben → <strong>„Erstellen"</strong> klicken</div>
        </div>
        <div className="step-info"><div className="step-num">3</div>
          <div><strong>Teilnehmer-URL</strong> → QR Code → letzte Präsentationsfolie<br/>
          <strong>Admin-URL</strong> → nur für Sie → Passwort: <code style={{background:'#f5f5f5',padding:'1px 5px',borderRadius:4}}>{ADMIN_PIN}</code></div>
        </div>

        {!urls?(<>
          <div style={{marginTop:16}}>
            <label style={{display:'block',fontWeight:700,fontSize:12,color:D,marginBottom:5}}>Master API Key</label>
            <input className="inp" type="text" value={apiKey}
              onChange={e=>setApiKey(e.target.value)}
              placeholder="$2a$10$..."
              style={{fontFamily:'monospace',fontSize:11}}/>
          </div>
          <button className="btn btn-t" style={{width:'100%',marginTop:12}}
            onClick={create} disabled={busy}>
            {busy?'⏳ Erstelle Datenspeicher…':'🚀 Erstellen & URLs generieren'}
          </button>
        </>):(<>
          <div className="sbox">
            <div style={{fontWeight:700,fontSize:12,color:D,marginBottom:8}}>✅ Fertig! Zwei URLs wurden erstellt:</div>

            <div style={{fontSize:11,color:T,fontWeight:700,marginBottom:3}}>👥 Teilnehmer-URL (→ QR Code)</div>
            <div className="surl">{urls.participant}</div>
            <button className="btn btn-t" style={{width:'100%',marginBottom:10}}
              onClick={()=>copy('p',urls.participant)}>
              {copied==='p'?'✓ Kopiert!':'📋 Teilnehmer-URL kopieren'}
            </button>

            <div style={{fontSize:11,color:D,fontWeight:700,marginBottom:3}}>🔐 Admin-URL (nur für Sie)</div>
            <div className="surl">{urls.admin}</div>
            <button className="btn btn-d" style={{width:'100%'}}
              onClick={()=>copy('a',urls.admin)}>
              {copied==='a'?'✓ Kopiert!':'📋 Admin-URL kopieren'}
            </button>

            <div style={{fontSize:11,color:'#888',marginTop:10,lineHeight:1.5}}>
              💡 Credentials im URL-Hash (#) — werden nicht an Server übertragen.<br/>
              🔁 Race-Condition-sicher: jede Antwort = eigener Datensatz.
            </div>
          </div>
          <button className="btn btn-t" style={{width:'100%',marginTop:10}}
            onClick={()=>location.href=urls.admin}>

          </button>
        </>)}
        {err&&<div style={{color:R,fontSize:12,marginTop:10,textAlign:'center'}}>⚠️ {err}</div>}
      </div>
    </div>
  );
}

// ─── Admin PIN gate ────────────────────────────────────────────────────────
function PinGate({onOk}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState(false);
  const check=()=>{
    if(pin===ADMIN_PIN){onOk();}
    else{setErr(true);setPin('');}
  };
  return(
    <div className="overlay">
      <div className="obox" style={{maxWidth:340,textAlign:'center'}}>
        <div style={{fontSize:42,marginBottom:10}}>🔐</div>
        <h2 style={{color:D,marginBottom:6}}>Admin-Bereich</h2>
        <p style={{color:'#888',fontSize:13,marginBottom:18}}>Bitte Passwort eingeben</p>
        <input className="inp" type="password" value={pin}
          onChange={e=>{setPin(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==='Enter'&&check()}
          placeholder="Passwort"
          style={{textAlign:'center',letterSpacing:4,marginBottom:10}}/>
        {err&&<div style={{color:R,fontSize:12,marginBottom:8}}>Falsches Passwort</div>}
        <button className="btn btn-t" style={{width:'100%'}} onClick={check}>→ Bestätigen</button>
      </div>
    </div>
  );
}

// ─── Stars ─────────────────────────────────────────────────────────────────
function Stars({val,set}){
  const [h,setH]=useState(0);
  return(
    <div>
      <div className="stars" style={{fontSize:44}}>
        {[1,2,3,4,5].map(s=>(
          <span key={s}
            style={{color:s<=(h||val)?'#FFB300':'#e0e0e0'}}
            onMouseEnter={()=>setH(s)} onMouseLeave={()=>setH(0)}

        ))}

// ─── Bar ───────────────────────────────────────────────────────────────────
function Bar({label,count,total,color}){
  const p=total?Math.round(count/total*100):0;
  return(
    <div className="bar-row">
      <span className="bar-label" style={{color}}>{label}</span>
      <div className="bar-track">
        <div className="bar-fill" style={{width:p+'%',background:color}}>
          {count>0&&<span>{count}</span>}
        </div>
      </div>
      <span className="bar-pct">{p>0?p+'%':''}</span>
    </div>
  );
}

// ─── SVG Export (for diff result) ─────────────────────────────────────────
function exportSVG(svgEl){
  const svg=svgEl.querySelector('svg');
  if(!svg) return;
  const clone=svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  const blob=new Blob([clone.outerHTML],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='geoENERGIE_workflow_diff.svg';
  a.click();
}

// ─── Results (admin-only) ──────────────────────────────────────────────────
function Results({data,onClear,onReload,apiKey,masterBin}){
  const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState('stats');
  const diffRef=useRef(null);

  const reload=async()=>{setBusy(true);await onReload();setBusy(false);};

  if(!data.length) return(
    <div className="card" style={{textAlign:'center',padding:50}}>
      <div style={{fontSize:52}}>📭</div>
      <p style={{marginTop:12,color:'#aaa',fontSize:15}}>Noch keine Feedbacks</p>
      <button className="btn btn-t" style={{marginTop:14}} onClick={reload}>↻ Aktualisieren</button>
    </div>
  );

  const total=data.length;
  const ratings=data.map(r=>r.rating).filter(Boolean);
  const avg=ratings.length?ratings.reduce((a,b)=>a+b,0)/ratings.length:0;

  // Node stats
  const origIds=new Set(NODES.map(n=>n.id));
  const nodeDelCnt={},addedMap={};
  data.forEach(r=>{
    if(!r.delNodes) return;
    r.delNodes.forEach(id=>{
      if(origIds.has(id)) nodeDelCnt[id]=(nodeDelCnt[id]||0)+1;
    });
    (r.addedNodes||[]).forEach(lbl=>{
      addedMap[lbl]=(addedMap[lbl]||0)+1;
    });
  });

  const edgeDelCnt={};
  data.forEach(r=>{
    if(!r.delEdges) return;
    r.delEdges.forEach(id=>{edgeDelCnt[id]=(edgeDelCnt[id]||0)+1;});
  });

  // For diff SVG: nStats, eStats, addedItems
  const nStats={};
  NODES.forEach(n=>{
    const del=nodeDelCnt[n.id]||0;
    nStats[n.id]={del,ret:(total-del)/total};
  });
  const eStats={};
  EDGES.forEach(e=>{
    const del=edgeDelCnt[e.id]||0;
    eStats[e.id]={del,ret:(total-del)/total};
  });
  const addedItems=Object.entries(addedMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([label,count])=>({label,count}));

  const recs=data.filter(r=>r.recs&&r.recs.trim()).map(r=>({name:r.name,text:r.recs}));
  const cmts=data.filter(r=>r.comment&&r.comment.trim()).map(r=>r.comment);

  const dist=[5,4,3,2,1].map(s=>({
    s,n:ratings.filter(r=>r===s).length,
    c:[T,'#66BB6A','#FFB300',OR,R][5-s]
  }));

  const kpis=[
    ['👥',total,'Antworten'],
    ['⭐',avg.toFixed(1)+'★','Ø Bewertung'],
    ['✏️',Object.keys(nodeDelCnt).length,'Schritte angefasst'],
    ['💬',recs.length,'Empfehlungen'],
  ];

  const tabBtn=(id,lbl)=>(
    <button onClick={()=>setTab(id)}
      style={{background:tab===id?D:'transparent',color:tab===id?'#fff':D,
        border:'1.5px solid '+D,borderRadius:7,padding:'6px 14px',
        cursor:'pointer',fontSize:12,fontWeight:700}}>
      {lbl}
    </button>
  );

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
          {tabBtn('stats','📊 Statistik')}
          {tabBtn('diff','🔄 Workflow-Diff')}
          {tabBtn('recs','💬 Empfehlungen')}
        </div>
        <div style={{display:'flex',gap:7}}>
          <button className="btn btn-t" onClick={reload} disabled={busy}>
            {busy?'⏳':'↻'} Aktualisieren
          </button>
          <button className="btn btn-r"
            onClick={()=>{if(window.confirm('Alle '+total+' Antworten unwiderruflich löschen?')) onClear();}}>
            🗑️ Löschen
          </button>
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        {kpis.map(([ico,val,lbl])=>(
          <div key={lbl} className="card" style={{flex:'1 1 120px',textAlign:'center',padding:'14px 8px',marginBottom:0}}>
            <div style={{fontSize:24}}>{ico}</div>
            <div style={{fontSize:26,fontWeight:800,color:T,lineHeight:1.1}}>{val}</div>
            <div style={{fontSize:11,color:'#999',marginTop:2}}>{lbl}</div>
          </div>
        ))}
      </div>

      {/* STATS TAB */}
      {tab==='stats'&&(
        <>
          <div className="card">
            <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>⭐ Bewertungsverteilung</h3>
            {dist.map(({s,n,c})=><Bar key={s} label={s+'★'} count={n} total={total} color={c}/>)}
          </div>

          {Object.keys(nodeDelCnt).length>0&&(
            <div className="card">
              <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>🗑️ Häufig entfernte Workflow-Schritte</h3>
              {Object.entries(nodeDelCnt).sort((a,b)=>b[1]-a[1]).map(([id,n])=>{
                const nd=NODES.find(x=>x.id===id);
                const lbl=nd?nd.lns[0]:id;
                return(
                  <div key={id} style={{display:'flex',justifyContent:'space-between',
                    alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f5f5f5'}}>
                    <span style={{fontSize:13}}>{lbl}</span>
                    <span style={{background:'#FFEBEE',color:'#C62828',
                      borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:700}}>
                      {n}× · {Math.round(n/total*100)}%
                    </span>
                  </div>
                );
              })}
            </div>
          )}

          {Object.keys(edgeDelCnt).length>0&&(
            <div className="card">
              <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>🔗 Häufig entfernte Verbindungen</h3>
              {Object.entries(edgeDelCnt).sort((a,b)=>b[1]-a[1]).map(([id,n])=>(
                <div key={id} style={{display:'flex',justifyContent:'space-between',
                  alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f5f5f5'}}>
                  <span style={{fontSize:13,color:'#555'}}>Verbindung {id}</span>
                  <span style={{background:'#FFEBEE',color:'#C62828',
                    borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:700}}>
                    {n}× · {Math.round(n/total*100)}%
                  </span>
                </div>
              ))}
            </div>
          )}

          {addedItems.length>0&&(
            <div className="card">
              <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>➕ Vorgeschlagene neue Schritte</h3>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {addedItems.map((it,i)=>(
                  <span key={i} className="tag" style={{background:'#E8F5E9',color:'#2E7D32'}}>
                    {it.label} ({it.count}×)
                  </span>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      {/* DIFF TAB */}
      {tab==='diff'&&(
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <h3 style={{margin:0,color:D,fontSize:14}}>🔄 Aggregierter Workflow-Diff ({total} Antworten)</h3>
            <button className="btn btn-d" onClick={()=>exportSVG(diffRef.current)}>
              ⬇ SVG Export
            </button>
          </div>
          <div style={{fontSize:11,color:'#888',marginBottom:10,lineHeight:1.6}}>
            <span style={{background:'rgba(239,83,80,.2)',padding:'2px 8px',borderRadius:4,marginRight:6}}>rot</span>oft entfernt (≥65%)&nbsp;&nbsp;
            <span style={{background:'rgba(255,112,67,.18)',padding:'2px 8px',borderRadius:4,marginRight:6}}>orange</span>manchmal entfernt (35–65%)&nbsp;&nbsp;
            Zahlen = % der Teilnehmer die diesen Schritt/Pfeil entfernt haben
          </div>
          <div ref={diffRef}>
            <WorkflowSVG mode="diff"
              nStats={nStats} eStats={eStats}
              addedItems={addedItems} total={total}/>
          </div>
        </div>
      )}

      {/* RECS TAB */}
      {tab==='recs'&&(
        <>
          {recs.length>0&&(
            <div className="card">
              <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>💬 Empfehlungen ({recs.length})</h3>
              {recs.map((r,i)=>(
                <div key={i} style={{padding:'10px 14px',background:'#F2F7F6',
                  borderRadius:6,marginBottom:8,borderLeft:'3px solid '+T}}>
                  {r.name&&<div style={{fontSize:11,color:T,fontWeight:700,marginBottom:3}}>{r.name}</div>}
                  <div style={{fontSize:13,whiteSpace:'pre-wrap'}}>{r.text}</div>
                </div>
              ))}
            </div>
          )}
          {cmts.length>0&&(
            <div className="card">
              <h3 style={{margin:'0 0 12px',color:D,fontSize:14}}>🗨️ Kommentare ({cmts.length})</h3>
              {cmts.map((c,i)=>(
                <div key={i} style={{padding:'8px 12px',background:'#FFFDE7',
                  borderRadius:6,marginBottom:6,fontSize:13,borderLeft:'3px solid #FFB300'}}>
                  {c}
                </div>
              ))}
            </div>
          )}
          {!recs.length&&!cmts.length&&(
            <div className="card" style={{textAlign:'center',color:'#bbb',padding:40}}>Keine Texteingaben vorhanden.</div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App(){
  const cfg=parseCfg();
  const api=cfg?{
    submit:(d)=>apiSubmit(cfg.key,cfg.mid,d),
    load:()=>apiLoad(cfg.key,cfg.mid),
    clear:()=>apiClear(cfg.key,cfg.mid),
  }:null;

  const [showSetup,setShowSetup]=useState(!cfg);
  const [adminUnlocked,setAdminUnlocked]=useState(false);
  const [mode,setMode]=useState('submit');
  const [step,setStep]=useState(1);
  const [rating,setRating]=useState(0);
  const [comment,setComment]=useState('');
  // Workflow edit state: sets of deleted IDs + added node labels
  const [delNodes,setDelNodes]=useState(new Set());
  const [delEdges,setDelEdges]=useState(new Set());
  const [addedNodes,setAddedNodes]=useState([]);
  const [newNodeInput,setNewNodeInput]=useState('');
  const [recs,setRecs]=useState('');
  const [name,setName]=useState('');
  const [data,setData]=useState([]);
  const [saving,setSaving]=useState(false);
  const [saveErr,setSaveErr]=useState('');

  const toggleN=id=>setDelNodes(s=>{const ns=new Set(s);ns.has(id)?ns.delete(id):ns.add(id);return ns;});
  const toggleE=id=>setDelEdges(s=>{const ns=new Set(s);ns.has(id)?ns.delete(id):ns.add(id);return ns;});
  const addNode=()=>{
    const v=newNodeInput.trim();
    if(!v) return;
    setAddedNodes(a=>[...a,v]);
    setNewNodeInput('');
  };

  const loadResults=async()=>{
    try{setData(await api.load());}
    catch(e){alert('Laden fehlgeschlagen: '+e.message);}
  };

  const goResults=async()=>{setMode('results');await loadResults();};

  const submit=async()=>{
    setSaving(true);setSaveErr('');
    try{
      await api.submit({
        rating,comment,
        delNodes:[...delNodes],
        delEdges:[...delEdges],
        addedNodes,
        recs,name
      });
      setStep('done');
    }catch(e){setSaveErr('Fehler: '+e.message);}
    finally{setSaving(false);}
  };

  const clearAll=async()=>{
    try{await api.clear();setData([]);}
    catch(e){alert(e.message);}
  };

  const isAdmin=cfg?.isAdmin;

  // Admin access gate
  if(isAdmin&&!adminUnlocked&&mode==='results'){
    return <PinGate onOk={()=>{setAdminUnlocked(true);}}/>;
  }

  if(showSetup) return <SetupScreen onDone={()=>setShowSetup(false)}/>;

  const inp={border:'1.5px solid #ddd',borderRadius:8,padding:'9px 12px',
    fontSize:13,width:'100%',outline:'none',transition:'border .2s'};

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:'#F2F7F6',minHeight:'100vh'}}>

      {/* Header */}
      <div style={{background:D,padding:'11px 18px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        boxShadow:'0 2px 14px rgba(0,0,0,.25)'}}>
        <div>
          <div style={{fontSize:17,fontWeight:800,color:'#fff',letterSpacing:.3}}>
            geo<span style={{color:'#4DB6AC'}}>ENERGIE</span> Tool
          </div>
          <div style={{fontSize:10.5,color:'rgba(255,255,255,.55)',marginTop:1}}>
            Feedback · geoENERGIE Tag 2026
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button onClick={()=>setMode('submit')}
            style={{background:mode==='submit'?'rgba(255,255,255,.2)':'transparent',
              color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:6,
              padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>
            📝 Feedback
          </button>
          {isAdmin&&(
            <button onClick={()=>{
              if(!adminUnlocked){setAdminUnlocked(false);}
              goResults();
            }}
              style={{background:mode==='results'?'rgba(255,255,255,.2)':'transparent',
                color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:6,
                padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>
              📊 Ergebnisse
            </button>
          )}
          <button onClick={()=>setShowSetup(true)} title="Einrichtung"
            style={{background:'transparent',color:'rgba(255,255,255,.4)',
              border:'none',cursor:'pointer',fontSize:18,lineHeight:1,paddingLeft:4}}>⚙</button>
        </div>
      </div>

      <div style={{maxWidth:1020,margin:'0 auto',padding:'18px 14px'}}>

        {/* SUBMIT FLOW */}
        {mode==='submit'&&(<>
          {step!=='done'&&(
            <div className="stepper">
              {[1,2,3].map((s,i)=>(
                <React.Fragment key={s}>
                  <div className="sdot"
                    style={{background:s<=step?T:'#ddd'}}>
                    {s<step?'✓':s}

              {addedNodes.length>0&&(
                <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:6}}>
                  {addedNodes.map((n,i)=>(
                    <span key={i} className="tag"
                      style={{background:'#E8F5E9',color:'#2E7D32',cursor:'pointer'}}
                      title="Klicken zum Entfernen"

                <div style={{marginTop:10,fontSize:12,color:'#888'}}>
                  Markiert zur Entfernung: {[...delNodes].map(id=>NODES.find(n=>n.id===id)?.lns[0]||id).join(', ')}
                  {delEdges.size>0&&' + '+delEdges.size+' Verbindung(en)'}
                  <span style={{cursor:'pointer',color:R,marginLeft:10,fontWeight:700}}
                    onClick={()=>{setDelNodes(new Set());setDelEdges(new Set());}}>
                    ↺ Alles zurücksetzen
                  </span>
                </div>
              )}

              <div style={{display:'flex',justifyContent:'space-between',marginTop:18}}>
                <button className="btn btn-gray" onClick={()=>setStep(1)}>← Zurück</button>
                <button className="btn btn-t" onClick={()=>setStep(3)}>Weiter →</button>
              </div>
            </>)}

            {/* Step 3 — Recommendations */}
            {step===3&&(<>
              <h2 style={{margin:'0 0 5px',color:D,fontSize:19}}>3. Empfehlungen</h2>
              <p style={{color:'#888',marginBottom:14,fontSize:13}}>
                Welche Features oder Verbesserungen würden Sie sich wünschen?
              </p>
              <textarea value={recs} onChange={e=>setRecs(e.target.value)}
                placeholder="z.B. FEFLOW-Integration, mobiler Zugriff, automatischer Bericht, neue Auswertungsmodule…"
                style={{...inp,height:110,resize:'vertical'}}/>
              <div style={{marginTop:12}}>
                <label style={{display:'block',fontWeight:700,fontSize:12,color:D,marginBottom:5}}>
                  Name / Firma <span style={{color:'#bbb',fontWeight:400}}>(optional)</span>
                </label>
                <input className="inp" value={name}
                  onChange={e=>setName(e.target.value)}
                  placeholder="Ihr Name oder Organisation"/>
              </div>
              {saveErr&&(
                <div style={{color:R,fontSize:12,marginTop:10,background:'#FFEBEE',
                  padding:'8px 12px',borderRadius:6}}>⚠️ {saveErr}</div>
              )}
              <div style={{display:'flex',justifyContent:'space-between',marginTop:18}}>
                <button className="btn btn-gray" onClick={()=>setStep(2)}>← Zurück</button>
                <button className="btn btn-t" onClick={submit} disabled={saving}>
                  {saving?'⏳ Wird gespeichert… (bitte warten)':'✓ Absenden'}
                </button>
              </div>
              {saving&&(
                <div style={{fontSize:11,color:'#aaa',marginTop:8,textAlign:'center'}}>
                  Übertragung läuft – bitte Seite nicht schließen…
                </div>
              )}
            </>)}

            {/* Done */}
            {step==='done'&&(
              <div style={{textAlign:'center',padding:'40px 16px'}}>
                <div style={{fontSize:60}}>🌍</div>
                <h2 style={{color:T,marginTop:14,fontSize:22}}>Vielen Dank!</h2>
                <p style={{color:'#888',fontSize:14,marginTop:8}}>
                  Ihr Feedback wurde erfolgreich gespeichert.
                </p>
                <p style={{color:'#bbb',fontSize:12,marginTop:4}}>
                  Es hilft uns, den geoENERGIE Tool weiterzuentwickeln.
                </p>
                <div style={{marginTop:26,color:D,fontWeight:700,fontSize:13}}>
                  Erdwärme. Aus einer Hand.
                </div>
              </div>
            )}
          </div>
        </>)}

        {/* RESULTS (admin only, after PIN) */}
        {mode==='results'&&adminUnlocked&&(
          <Results data={data} onClear={clearAll}
            onReload={loadResults}
            apiKey={cfg?.key} masterBin={cfg?.mid}/>
        )}

        {/* Non-admin trying to access results */}
        {mode==='results'&&!isAdmin&&(
          <div className="card" style={{textAlign:'center',padding:50}}>
            <div style={{fontSize:48}}>🔒</div>
            <p style={{marginTop:12,color:'#888'}}>
              Ergebnisse sind nur für Administratoren zugänglich.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
