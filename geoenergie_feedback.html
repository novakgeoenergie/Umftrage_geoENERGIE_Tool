<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>geoENERGIE Tool — Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F4F8F7;color:#222;min-height:100vh}
    textarea,input{font-family:'DM Sans',sans-serif}
    :root{
      --teal:#00857A;--dark:#1a5c58;--green:#4CAF50;
      --lteal:#E0F2F1;--bg:#F4F8F7;--star:#FFB300;
      --red:#EF5350;--gray:#9E9E9E;
    }
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
    .overlay-box{background:#fff;border-radius:16px;padding:36px;max-width:500px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .overlay-box h2{color:var(--dark);margin-bottom:6px;font-size:20px}
    .overlay-box .sub{color:#888;font-size:13px;line-height:1.6;margin-bottom:22px}
    .step-row{display:flex;align-items:flex-start;gap:10px;background:#F4F8F7;border-radius:8px;padding:11px 14px;margin-bottom:8px;font-size:12px;color:#555;line-height:1.5}
    .step-row .num{background:var(--dark);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
    .step-row a{color:var(--teal);font-weight:700}
    .sep{text-align:center;color:#bbb;font-size:12px;margin:14px 0 8px}
    .fld{margin-bottom:14px}
    .fld label{display:block;font-weight:700;font-size:12px;color:var(--dark);margin-bottom:5px}
    .fld input{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;transition:border .2s}
    .fld input:focus{border-color:var(--teal)}
    .btn-primary{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;transition:background .2s}
    .btn-primary:hover{background:var(--dark)}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed}
    .err{color:var(--red);font-size:12px;margin-top:8px;text-align:center}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useMemo, useEffect } = React;

// ── Constants ─────────────────────────────────────────────────────────────
const NW=144, NH=56;
const NODES0=[
  {id:'n1',label:'Projekt',              x:22, y:200,t:'proj'},
  {id:'n2',label:'Räuml. Analyse\n(EWS Setup)',  x:198,y:82, t:'ews'},
  {id:'n3',label:'EWS Parameter',         x:374,y:82, t:'ews'},
  {id:'n4',label:'EWS Sizing &\nSimulation',x:555,y:82, t:'ews'},
  {id:'n5',label:'EWS Wirtschaft-\nlichkeit',x:735,y:82, t:'ews'},
  {id:'n6',label:'Räuml. Analyse\n(GWHP)',  x:198,y:320,t:'gwhp'},
  {id:'n7',label:'GWHP\nDimensionierung', x:374,y:320,t:'gwhp'},
  {id:'n8',label:'Bericht\n(Word / PDF)',  x:555,y:320,t:'rep'},
];
const EDGES0=[
  {id:'e1',f:'n1',t:'n2'},{id:'e2',f:'n2',t:'n3'},{id:'e3',f:'n3',t:'n4'},
  {id:'e4',f:'n4',t:'n5'},{id:'e5',f:'n1',t:'n6'},{id:'e6',f:'n6',t:'n7'},
  {id:'e7',f:'n7',t:'n8'},{id:'e8',f:'n4',t:'n8'},{id:'e9',f:'n5',t:'n8'},
];
const NCLR={
  proj:{bg:'#E3F2FD',txt:'#1565C0',bd:'#90CAF9'},
  ews: {bg:'#E0F2F1',txt:'#00695C',bd:'#80CBC4'},
  gwhp:{bg:'#E8F5E9',txt:'#2E7D32',bd:'#A5D6A7'},
  rep: {bg:'#FFF3E0',txt:'#E65100',bd:'#FFCC80'},
  cust:{bg:'#F3E5F5',txt:'#6A1B9A',bd:'#CE93D8'},
};
const STAR_LBL=['','Unzureichend','Verbesserungsbedürftig','Befriedigend','Gut','Ausgezeichnet'];
const STORE_KEY='ge_jbin';

// ── JSONBin Storage ────────────────────────────────────────────────────────
function getCfg(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch{return {};}
}
function setCfg(o){localStorage.setItem(STORE_KEY,JSON.stringify({...getCfg(),...o}));}

async function jbinLoad(){
  const {key,bin}=getCfg();
  if(!key||!bin) return [];
  const r=await fetch(`https://api.jsonbin.io/v3/b/${bin}/latest`,{headers:{'X-Master-Key':key}});
  if(!r.ok) throw new Error('Laden fehlgeschlagen ('+r.status+')');
  const d=await r.json();
  return d.record?.responses||[];
}

async function jbinSave(responses){
  const {key,bin}=getCfg();
  const r=await fetch(`https://api.jsonbin.io/v3/b/${bin}`,{
    method:'PUT',
    headers:{'X-Master-Key':key,'Content-Type':'application/json'},
    body:JSON.stringify({responses})
  });
  if(!r.ok) throw new Error('Speichern fehlgeschlagen ('+r.status+')');
}

async function jbinAppend(entry){
  const arr=await jbinLoad();
  arr.push({...entry,id:Date.now(),ts:new Date().toISOString()});
  await jbinSave(arr);
}

async function jbinCreateBin(apiKey){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'X-Master-Key':apiKey,'Content-Type':'application/json','X-Bin-Name':'geoENERGIE Feedback'},
    body:JSON.stringify({responses:[]})
  });
  if(!r.ok) throw new Error('Bin konnte nicht erstellt werden ('+r.status+') — API Key prüfen');
  const d=await r.json();
  return d.metadata.id;
}

// ── Geometry ──────────────────────────────────────────────────────────────
function borderPt(cx,cy,ox,oy){
  const dx=ox-cx,dy=oy-cy;
  if(!dx&&!dy) return {x:cx,y:cy};
  const sx=dx?(NW/2)/Math.abs(dx):Infinity;
  const sy=dy?(NH/2)/Math.abs(dy):Infinity;
  const s=Math.min(sx,sy);
  return {x:cx+dx*s,y:cy+dy*s};
}

// ── Setup Screen ──────────────────────────────────────────────────────────
function SetupScreen({onDone}){
  const [apiKey,setApiKey]=useState('');
  const [binId,setBinId]=useState('');
  const [creating,setCreating]=useState(false);
  const [err,setErr]=useState('');

  const createBin=async()=>{
    if(!apiKey.trim()){setErr('Bitte API Key eingeben.');return;}
    setCreating(true); setErr('');
    try{
      const id=await jbinCreateBin(apiKey.trim());
      setCfg({key:apiKey.trim(),bin:id});
      onDone();
    }catch(e){setErr(e.message);}
    finally{setCreating(false);}
  };

  const useExisting=()=>{
    if(!apiKey.trim()||!binId.trim()){setErr('Bitte API Key und Bin ID eingeben.');return;}
    setCfg({key:apiKey.trim(),bin:binId.trim()});
    onDone();
  };

  return (
    <div className="overlay">
      <div className="overlay-box">
        <h2>⚙️ Einrichtung</h2>
        <p className="sub">
          Einmalige Konfiguration für die geteilte Datenspeicherung.<br/>
          Alle Antworten der Teilnehmer landen in einem <strong>JSONBin</strong> (kostenlos).
        </p>

        <div className="step-row"><div className="num">1</div>
          <div>Account erstellen auf <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> (kostenlos, keine Kreditkarte)</div>
        </div>
        <div className="step-row"><div className="num">2</div>
          <div>Nach Login: <strong>API Keys</strong> → <strong>+ CREATE KEY</strong> → kopieren</div>
        </div>
        <div className="step-row"><div className="num">3</div>
          <div>API Key unten eingeben → <strong>„Bin automatisch erstellen"</strong> klicken</div>
        </div>

        <div className="fld" style={{marginTop:20}}>
          <label>API Key (Master Key von jsonbin.io)</label>
          <input type="text" value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="$2a$10$..." style={{fontFamily:'monospace',fontSize:12}}/>
        </div>

        <button className="btn-primary" onClick={createBin} disabled={creating}>
          {creating?'⏳ Erstelle Bin...':'🚀 Bin automatisch erstellen & loslegen'}
        </button>

        <div className="sep">— oder bestehenden Bin verwenden —</div>

        <div className="fld">
          <label>Bin ID (aus vorheriger Einrichtung)</label>
          <input type="text" value={binId} onChange={e=>setBinId(e.target.value)} placeholder="67a3b2c4..."/>
        </div>
        <button className="btn-primary" onClick={useExisting} style={{marginTop:0,background:'#1a5c58'}}>
          Bestehenden Bin verwenden
        </button>

        {err&&<div className="err">⚠️ {err}</div>}
      </div>
    </div>
  );
}

// ── Stars ─────────────────────────────────────────────────────────────────
function Stars({val,set}){
  const [h,setH]=useState(0);
  return(
    <div>
      <div style={{display:'flex',gap:6,fontSize:46,cursor:'pointer',userSelect:'none'}}>
        {[1,2,3,4,5].map(s=>(
          <span key={s} style={{color:s<=(h||val)?'#FFB300':'#e0e0e0',transition:'color .12s'}}
            onMouseEnter={()=>setH(s)} onMouseLeave={()=>setH(0)}
            onClick={()=>set(s)}>★</span>
        ))}
      </div>
      {(h||val)>0&&<div style={{fontSize:13,color:'#00857A',fontWeight:700,marginTop:5}}>{STAR_LBL[h||val]}</div>}
    </div>
  );
}

// ── Workflow Editor ───────────────────────────────────────────────────────
function Editor({nodes,setNodes,edges,setEdges}){
  const svgRef=useRef(null);
  const [drag,setDrag]=useState(null);
  const [sel,setSel]=useState(null);
  const [selE,setSelE]=useState(null);
  const [conn,setConn]=useState(null);
  const nm=useMemo(()=>Object.fromEntries(nodes.map(n=>[n.id,n])),[nodes]);

  const svgXY=(cx,cy)=>{const r=svgRef.current.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top};};

  const edgePts=(edge)=>{
    const a=nm[edge.f],b=nm[edge.t]; if(!a||!b) return null;
    const ac={x:a.x+NW/2,y:a.y+NH/2},bc={x:b.x+NW/2,y:b.y+NH/2};
    return{p1:borderPt(ac.x,ac.y,bc.x,bc.y),p2:borderPt(bc.x,bc.y,ac.x,ac.y)};
  };

  const onMove=useCallback((cx,cy)=>{
    if(!drag) return;
    const{x,y}=svgXY(cx,cy);
    setNodes(ns=>ns.map(n=>n.id===drag.id?{...n,x:Math.max(0,Math.min(890-NW,x-drag.ox)),y:Math.max(0,Math.min(390-NH,y-drag.oy))}:n));
  },[drag,setNodes]);

  const onNodeDown=(cx,cy,id,sp)=>{
    if(sp) sp();
    if(conn){
      if(conn!==id&&!edges.find(e=>e.f===conn&&e.t===id))
        setEdges(es=>[...es,{id:'ec'+Date.now(),f:conn,t:id}]);
      setConn(null); return;
    }
    const{x,y}=svgXY(cx,cy);
    setDrag({id,ox:x-nm[id].x,oy:y-nm[id].y});
    setSel(id); setSelE(null);
  };

  const bS=(bg,dis=false)=>({background:dis?'#eee':bg,color:dis?'#bbb':'#fff',
    border:'none',borderRadius:6,padding:'5px 11px',fontSize:11,fontWeight:700,cursor:dis?'not-allowed':'pointer'});

  const selN=sel?nm[sel]:null;
  const hint=conn?'🔗 Ziel-Node anklicken':sel?`✓ "${selN?.label.replace('\n',' ')}" ausgewählt`:selE?'→ Verbindung ausgewählt':'🖱 Ziehen=verschieben · Klick=auswählen';

  return(
    <div>
      <div style={{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{flex:1,fontSize:11,color:conn?'#E65100':'#aaa',fontStyle:conn?'normal':'italic'}}>{hint}</span>
        <button onClick={()=>{const l=prompt('Name:','Neuer Schritt');if(l) setNodes(ns=>[...ns,{id:'c'+Date.now(),label:l,x:180+Math.random()*400,y:175+Math.random()*100,t:'cust'}]);}} style={bS('#00857A')}>＋ Node</button>
        <button onClick={()=>sel&&setConn(sel)} disabled={!sel} style={bS('#1a5c58',!sel)}>→ Verbinden</button>
        <button onClick={()=>{if(!sel)return;const nl=prompt('Neuer Name:',nm[sel]?.label.replace(/\n/g,' '));if(nl)setNodes(ns=>ns.map(n=>n.id===sel?{...n,label:nl}:n));}} disabled={!sel} style={bS('#555',!sel)}>✏ Umbenennen</button>
        <button onClick={()=>{if(sel){setNodes(ns=>ns.filter(n=>n.id!==sel));setEdges(es=>es.filter(e=>e.f!==sel&&e.t!==sel));setSel(null);}else if(selE){setEdges(es=>es.filter(e=>e.id!==selE));setSelE(null);}}} disabled={!sel&&!selE} style={bS('#EF5350',!sel&&!selE)}>✕ Löschen</button>
        <button onClick={()=>{setNodes(NODES0.map(n=>({...n})));setEdges(EDGES0.map(e=>({...e})));setSel(null);setSelE(null);setConn(null);}} style={bS('#999')}>↺ Reset</button>
      </div>
      <div style={{border:'2px solid #E0F2F1',borderRadius:8,overflow:'auto',background:'#FAFFFE'}}>
        <svg ref={svgRef} width={920} height={430}
          style={{display:'block',userSelect:'none',cursor:conn?'crosshair':'default'}}
          onMouseMove={e=>onMove(e.clientX,e.clientY)}
          onMouseUp={()=>setDrag(null)} onMouseLeave={()=>setDrag(null)}
          onTouchMove={e=>{const t=e.touches[0];onMove(t.clientX,t.clientY);}}
          onTouchEnd={()=>setDrag(null)}
          onClick={e=>{if(e.target===svgRef.current){setSel(null);setSelE(null);setConn(null);}}}
        >
          <defs>
            <marker id="arr"  markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#00857A"/></marker>
            <marker id="arrs" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#EF5350"/></marker>
            <marker id="arrc" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#FFB300"/></marker>
          </defs>
          {edges.map(edge=>{
            const p=edgePts(edge); if(!p) return null;
            const iS=edge.id===selE,fC=edge.f===conn;
            return <line key={edge.id} x1={p.p1.x} y1={p.p1.y} x2={p.p2.x} y2={p.p2.y}
              stroke={iS?'#EF5350':fC?'#FFB300':'#00857A'} strokeWidth={iS||fC?2.5:2}
              strokeDasharray={iS?'5,3':'none'} markerEnd={iS?'url(#arrs)':fC?'url(#arrc)':'url(#arr)'}
              style={{cursor:'pointer'}} onClick={e=>{e.stopPropagation();setSelE(edge.id);setSel(null);setConn(null);}}/>;
          })}
          {nodes.map(node=>{
            const nc=NCLR[node.t]||NCLR.cust,iS=node.id===sel,iC=node.id===conn;
            const lines=node.label.split('\n');
            return <g key={node.id} transform={`translate(${node.x},${node.y})`}
              style={{cursor:drag?.id===node.id?'grabbing':'grab'}}
              onMouseDown={e=>onNodeDown(e.clientX,e.clientY,node.id,()=>e.stopPropagation())}
              onTouchStart={e=>{const t=e.touches[0];onNodeDown(t.clientX,t.clientY,node.id,null);}}>
              <rect width={NW} height={NH} rx={7} fill={iC?'#FFF9C4':nc.bg}
                stroke={iS?'#EF5350':iC?'#FFB300':nc.bd} strokeWidth={iS||iC?2.5:1.5}
                filter={iS?'drop-shadow(0 3px 8px rgba(0,0,0,.18))':'none'}/>
              {lines.map((l,i)=><text key={i} x={NW/2} y={NH/2+(i-(lines.length-1)/2)*16}
                textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight={700}
                fill={iC?'#E65100':nc.txt} style={{pointerEvents:'none'}}>{l}</text>)}
            </g>;
          })}
        </svg>
      </div>
      <p style={{fontSize:11,color:'#ccc',marginTop:4,fontStyle:'italic'}}>
        💡 Node auswählen → „Verbinden" → Ziel anklicken | Verbindung anklicken → Löschen
      </p>
    </div>
  );
}

// ── Bar ───────────────────────────────────────────────────────────────────
function Bar({label,count,total,color}){
  const p=total?Math.round(count/total*100):0;
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
      <span style={{width:34,textAlign:'right',fontSize:13,fontWeight:700,color}}>{label}</span>
      <div style={{flex:1,background:'#f0f0f0',borderRadius:4,height:22,overflow:'hidden'}}>
        <div style={{width:p+'%',background:color,height:'100%',borderRadius:4,transition:'width .6s',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:6}}>
          {count>0&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>{count}</span>}
        </div>
      </div>
      <span style={{width:36,fontSize:12,color:'#999'}}>{p>0?p+'%':''}</span>
    </div>
  );
}

// ── Results ───────────────────────────────────────────────────────────────
function Results({data,onClear,onReload}){
  const [loading,setLoading]=useState(false);
  const reload=async()=>{setLoading(true);await onReload();setLoading(false);};

  if(!data.length) return(
    <div style={{textAlign:'center',padding:60,color:'#bbb'}}>
      <div style={{fontSize:52}}>📭</div>
      <p style={{marginTop:12,fontSize:15}}>Noch keine Feedbacks eingegangen.</p>
      <button onClick={reload} style={{marginTop:16,background:'#00857A',color:'#fff',border:'none',borderRadius:7,padding:'8px 20px',cursor:'pointer',fontSize:13,fontWeight:700}}>↻ Aktualisieren</button>
    </div>
  );

  const ratings=data.map(r=>r.rating).filter(Boolean);
  const avg=ratings.reduce((a,b)=>a+b,0)/ratings.length;
  const dist=[5,4,3,2,1].map(s=>({s,n:ratings.filter(r=>r===s).length,c:['#00857A','#66BB6A','#FFB300','#FF7043','#EF5350'][5-s]}));

  const origIds=new Set(NODES0.map(n=>n.id));
  const deletions={},additions=[];
  data.forEach(r=>{
    if(!r.nodes) return;
    const rIds=new Set(r.nodes.map(n=>n.id));
    origIds.forEach(id=>{if(!rIds.has(id)) deletions[id]=(deletions[id]||0)+1;});
    r.nodes.filter(n=>!origIds.has(n.id)).forEach(n=>additions.push(n.label));
  });

  const comments=data.filter(r=>r.comment).map(r=>r.comment);
  const recs=data.filter(r=>r.recs).map(r=>({name:r.name,text:r.recs}));

  const card={background:'#fff',borderRadius:10,padding:20,marginBottom:14,boxShadow:'0 2px 8px rgba(0,0,0,.07)'};
  const h3={margin:'0 0 14px',color:'#1a5c58',fontSize:15,fontWeight:700};
  const origLbl=id=>NODES0.find(n=>n.id===id)?.label.replace('\n',' ')||id;

  return(
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10,gap:8}}>
        <button onClick={reload} disabled={loading}
          style={{background:'#1a5c58',color:'#fff',border:'none',borderRadius:6,padding:'6px 14px',cursor:loading?'wait':'pointer',fontSize:12,fontWeight:700}}>
          {loading?'⏳ Lade...':'↻ Aktualisieren'}
        </button>
        <button onClick={()=>{if(window.confirm('Alle Daten in JSONBin löschen?')) onClear();}}
          style={{background:'#EF5350',color:'#fff',border:'none',borderRadius:6,padding:'6px 14px',cursor:'pointer',fontSize:12,fontWeight:700}}>
          🗑️ Alle löschen
        </button>
      </div>

      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        {[['👥',data.length,'Antworten'],['⭐',avg.toFixed(1)+'★','Ø Bewertung'],['➕',additions.length,'Neue Schritte'],['💬',recs.length,'Empfehlungen']].map(([i,v,l])=>(
          <div key={l} style={{...card,flex:'1 1 120px',textAlign:'center',padding:'14px 8px',marginBottom:0}}>
            <div style={{fontSize:24}}>{i}</div>
            <div style={{fontSize:28,fontWeight:800,color:'#00857A',lineHeight:1.1}}>{v}</div>
            <div style={{fontSize:11,color:'#999',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      <div style={card}>
        <h3 style={h3}>⭐ Bewertungsverteilung</h3>
        {dist.map(({s,n,c})=><Bar key={s} label={s+'★'} count={n} total={data.length} color={c}/>)}
      </div>

      {Object.keys(deletions).length>0&&(
        <div style={card}>
          <h3 style={h3}>🗑️ Häufig entfernte Schritte</h3>
          {Object.entries(deletions).sort((a,b)=>b[1]-a[1]).map(([id,n])=>(
            <div key={id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f5f5f5'}}>
              <span style={{fontSize:13}}>{origLbl(id)}</span>
              <span style={{background:'#FFEBEE',color:'#C62828',borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:700}}>{n}× · {Math.round(n/data.length*100)}%</span>
            </div>
          ))}
        </div>
      )}

      {additions.length>0&&(
        <div style={card}>
          <h3 style={h3}>➕ Vorgeschlagene neue Schritte</h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {additions.map((l,i)=><span key={i} style={{background:'#E0F2F1',color:'#1a5c58',borderRadius:20,padding:'3px 12px',fontSize:12,fontWeight:600}}>{l}</span>)}
          </div>
        </div>
      )}

      {recs.length>0&&(
        <div style={card}>
          <h3 style={h3}>💬 Empfehlungen ({recs.length})</h3>
          {recs.map((r,i)=>(
            <div key={i} style={{padding:'10px 14px',background:'#F4F8F7',borderRadius:6,marginBottom:8,borderLeft:'3px solid #00857A'}}>
              {r.name&&<div style={{fontSize:11,color:'#00857A',fontWeight:700,marginBottom:4}}>{r.name}</div>}
              <div style={{fontSize:13,whiteSpace:'pre-wrap'}}>{r.text}</div>
            </div>
          ))}
        </div>
      )}

      {comments.length>0&&(
        <div style={card}>
          <h3 style={h3}>🗨️ Bewertungskommentare</h3>
          {comments.map((c,i)=>(
            <div key={i} style={{padding:'8px 12px',background:'#FFFDE7',borderRadius:6,marginBottom:6,fontSize:13,borderLeft:'3px solid #FFB300'}}>{c}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App(){
  const [setup, setSetup]=useState(!getCfg().key);
  const [mode,  setMode]=useState('submit');
  const [step,  setStep]=useState(1);
  const [rating,setRating]=useState(0);
  const [comment,setComment]=useState('');
  const [nodes, setNodes]=useState(()=>NODES0.map(n=>({...n})));
  const [edges, setEdges]=useState(()=>EDGES0.map(e=>({...e})));
  const [recs,  setRecs]=useState('');
  const [name,  setName]=useState('');
  const [data,  setData]=useState([]);
  const [saving,setSaving]=useState(false);
  const [saveErr,setSaveErr]=useState('');

  const loadResults=async()=>{ try{setData(await jbinLoad());}catch(e){alert('Fehler: '+e.message);} };

  const goResults=async()=>{setMode('results');await loadResults();};

  const submit=async()=>{
    setSaving(true); setSaveErr('');
    try{
      await jbinAppend({rating,comment,nodes,edges,recs,name});
      setStep('done');
    }catch(e){ setSaveErr('Fehler beim Speichern: '+e.message); }
    finally{ setSaving(false); }
  };

  const clearAll=async()=>{ try{await jbinSave([]);setData([]);}catch(e){alert(e.message);} };

  const inp={border:'1.5px solid #e0e0e0',borderRadius:8,padding:'9px 12px',fontSize:13,width:'100%',outline:'none',transition:'border .2s'};

  if(setup) return <SetupScreen onDone={()=>setSetup(false)}/>;

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:'#F4F8F7',minHeight:'100vh'}}>

      {/* Header */}
      <div style={{background:'#1a5c58',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 12px rgba(0,0,0,.25)'}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:'#fff',letterSpacing:.3}}>
            geo<span style={{color:'#4DB6AC'}}>ENERGIE</span> Tool
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.6)',marginTop:1}}>Feedback · geoENERGIE Tag 2026</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['submit','📝 Feedback'],['results','📊 Ergebnisse']].map(([m,lbl])=>(
            <button key={m} onClick={m==='results'?goResults:()=>setMode('submit')}
              style={{background:mode===m?'rgba(255,255,255,.2)':'transparent',color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:6,padding:'6px 13px',cursor:'pointer',fontSize:12,fontWeight:mode===m?700:400}}>
              {lbl}
            </button>
          ))}
          <button onClick={()=>{localStorage.removeItem(STORE_KEY);setSetup(true);}}
            title="Konfiguration zurücksetzen"
            style={{background:'transparent',color:'rgba(255,255,255,.4)',border:'none',cursor:'pointer',fontSize:16,padding:'0 4px'}}>⚙</button>
        </div>
      </div>

      <div style={{maxWidth:980,margin:'0 auto',padding:'20px 16px'}}>

        {/* SUBMIT */}
        {mode==='submit'&&(
          <>
            {step!=='done'&&(
              <div style={{display:'flex',alignItems:'center',marginBottom:18}}>
                {[1,2,3].map((s,i)=>(
                  <React.Fragment key={s}>
                    <div style={{width:30,height:30,borderRadius:'50%',flexShrink:0,
                      background:s<=step?'#00857A':'#ddd',color:'#fff',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}}>
                      {s<step?'✓':s}
                    </div>
                    {i<2&&<div style={{flex:1,height:3,background:s<step?'#00857A':'#ddd',margin:'0 4px'}}/>}
                  </React.Fragment>
                ))}
              </div>
            )}

            <div style={{background:'#fff',borderRadius:12,padding:24,boxShadow:'0 2px 12px rgba(0,0,0,.08)'}}>
              {step===1&&(
                <>
                  <h2 style={{margin:'0 0 6px',color:'#1a5c58',fontSize:20}}>1. Gesamtbewertung</h2>
                  <p style={{color:'#888',marginBottom:20,fontSize:14}}>Wie bewerten Sie den geoENERGIE Tool insgesamt?</p>
                  <Stars val={rating} set={setRating}/>
                  <div style={{marginTop:20}}>
                    <label style={{display:'block',marginBottom:6,fontWeight:700,fontSize:13,color:'#1a5c58'}}>
                      Kommentar <span style={{color:'#bbb',fontWeight:400}}>(optional)</span>
                    </label>
                    <textarea value={comment} onChange={e=>setComment(e.target.value)}
                      placeholder="Was hat besonders gut gefallen? Was weniger?"
                      style={{...inp,height:90,resize:'vertical'}}/>
                  </div>
                  <div style={{textAlign:'right',marginTop:20}}>
                    <button onClick={()=>setStep(2)} disabled={!rating}
                      style={{background:rating?'#00857A':'#ccc',color:'#fff',border:'none',borderRadius:8,padding:'11px 28px',fontSize:14,fontWeight:700,cursor:rating?'pointer':'not-allowed'}}>
                      Weiter →
                    </button>
                  </div>
                </>
              )}

              {step===2&&(
                <>
                  <h2 style={{margin:'0 0 6px',color:'#1a5c58',fontSize:20}}>2. Workflow-Analyse</h2>
                  <p style={{color:'#888',marginBottom:16,fontSize:14}}>
                    Wie würden Sie den Workflow anpassen? Schritte verschieben, umbenennen, löschen oder neue hinzufügen.
                  </p>
                  <Editor nodes={nodes} setNodes={setNodes} edges={edges} setEdges={setEdges}/>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:20}}>
                    <button onClick={()=>setStep(1)} style={{background:'#888',color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',cursor:'pointer'}}>← Zurück</button>
                    <button onClick={()=>setStep(3)} style={{background:'#00857A',color:'#fff',border:'none',borderRadius:8,padding:'11px 28px',fontSize:14,fontWeight:700,cursor:'pointer'}}>Weiter →</button>
                  </div>
                </>
              )}

              {step===3&&(
                <>
                  <h2 style={{margin:'0 0 6px',color:'#1a5c58',fontSize:20}}>3. Empfehlungen</h2>
                  <p style={{color:'#888',marginBottom:16,fontSize:14}}>Welche Features oder Verbesserungen würden Sie sich wünschen?</p>
                  <textarea value={recs} onChange={e=>setRecs(e.target.value)}
                    placeholder="z.B. FEFLOW-Integration, mobiler Zugriff, automatischer Bericht, neue Module..."
                    style={{...inp,height:120,resize:'vertical'}}/>
                  <div style={{marginTop:14}}>
                    <label style={{display:'block',marginBottom:6,fontWeight:700,fontSize:13,color:'#1a5c58'}}>
                      Name / Firma <span style={{color:'#bbb',fontWeight:400}}>(optional)</span>
                    </label>
                    <input value={name} onChange={e=>setName(e.target.value)}
                      placeholder="Ihr Name oder Organisation" style={inp}/>
                  </div>
                  {saveErr&&<div style={{color:'#EF5350',fontSize:12,marginTop:10}}>⚠️ {saveErr}</div>}
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:20}}>
                    <button onClick={()=>setStep(2)} style={{background:'#888',color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',cursor:'pointer'}}>← Zurück</button>
                    <button onClick={submit} disabled={saving}
                      style={{background:saving?'#aaa':'#00857A',color:'#fff',border:'none',borderRadius:8,padding:'11px 28px',fontSize:14,fontWeight:700,cursor:saving?'wait':'pointer'}}>
                      {saving?'⏳ Speichert...':'✓ Absenden'}
                    </button>
                  </div>
                </>
              )}

              {step==='done'&&(
                <div style={{textAlign:'center',padding:'44px 20px'}}>
                  <div style={{fontSize:62}}>🌍</div>
                  <h2 style={{color:'#00857A',marginTop:16,fontSize:24}}>Vielen Dank!</h2>
                  <p style={{color:'#888',fontSize:15,marginTop:8}}>Ihr Feedback wurde gespeichert.</p>
                  <p style={{color:'#bbb',fontSize:13,marginTop:4}}>Es hilft uns, den geoENERGIE Tool weiterzuentwickeln.</p>
                  <div style={{marginTop:28,color:'#1a5c58',fontWeight:700,fontSize:14}}>Erdwärme. Aus einer Hand.</div>
                </div>
              )}
            </div>
          </>
        )}

        {/* RESULTS */}
        {mode==='results'&&<Results data={data} onClear={clearAll} onReload={loadResults}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
